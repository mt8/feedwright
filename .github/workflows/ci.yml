name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpcs:
    name: phpcs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer install --no-interaction
      - run: composer run phpcs

  phpunit:
    name: "PHPUnit (WP ${{ matrix.wp }} / PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    strategy:
      fail-fast: false
      matrix:
        include:
          - wp: latest
            php: '8.3'
          - wp: latest
            php: '8.4'
          - wp: '6.5'
            php: '8.3'
          - wp: '6.5'
            php: '8.4'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          extensions: mysqli
      - name: Reinstall Composer dependencies (with dev)
        run: |
          rm -rf vendor
          composer install --no-interaction
      - name: Install WordPress test suite
        # SKIP_DB_CREATE=false: MySQL サービスは MYSQL_DATABASE 未指定なので、スクリプトが新規作成する
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp }} false
      - name: Run PHPUnit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
        run: vendor/bin/phpunit --bootstrap tests/bootstrap.php

  plugin-check:
    # readme.txt / languages/feedwright.pot などが未整備なので警告ジョブとして扱う。
    # 仕様 §22 Phase 6 (仕上げ) でそれらを整備した上で必須ジョブに昇格させる。
    name: Plugin Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: Install Composer dependencies
        # plugin-check は wp-env でプラグインを activate するので、その前に
        # PSR-4 オートローダを揃えておかないと Feedwright\\Plugin が見つからず
        # fatal で落ちる。
        run: composer install --no-dev --no-interaction --optimize-autoloader
      - uses: wordpress/plugin-check-action@v1
        with:
          slug: feedwright
          exclude-directories: 'tests,node_modules,build,blocks/*/build,.github,.husky,.claude,docs,bin'
          # 開発・配布対象外のファイルは Plugin Check からも除外（.distignore と同等）。
          exclude-files: 'composer.json,composer.lock,package.json,package-lock.json,phpcs.xml.dist,phpunit.xml.dist,playwright.config.ts,.wp-env.json,.wp-env.override.json,.gitignore,.distignore,debug.log,db.sql,CLAUDE.md'
          categories: |
            general
            performance
            accessibility
            plugin_repo
            security

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: npm ci
      - run: composer install --no-interaction
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - name: Start wp-env
        run: npx wp-env start
      - name: Run E2E tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
